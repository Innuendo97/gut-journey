include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/l10n/generated/**"

linter:
  rules:
    # Documenting every public member adds noise in an app (vs a library);
    # doc comments are reserved for non-obvious APIs.
    public_member_api_docs: false
    # Riverpod 3 family/autoDispose providers have internal (inexpressible)
    # static types; inference is the intended usage.
    specify_nonobvious_property_types: false
