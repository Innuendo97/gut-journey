name: gut_journey
description: >-
  A local-first health diary for people with functional gastrointestinal
  disorders. Track meals, symptoms, bowel movements, weight, medications,
  water, sleep and activity — and turn them into insight.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cupertino_icons: ^1.0.8
  # Pinned exactly: drift and drift_dev must stay in lockstep for the
  # schema-verification tooling (dump/verify) to work.
  drift: 2.34.0
  drift_flutter: ^0.3.1
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: any
  json_annotation: ^4.12.0
  meta: ^1.17.0
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5
  table_calendar: ^3.2.0
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.1
  drift_dev: ^2.34.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  generate: true
